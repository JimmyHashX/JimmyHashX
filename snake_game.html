<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇 Snake Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #00ff88;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,200,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .title {
    font-size: 20px;
    letter-spacing: 4px;
    margin-bottom: 16px;
    text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff8855;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .stats {
    display: flex;
    gap: 40px;
    margin-bottom: 16px;
    font-size: 9px;
    color: #00ccff;
  }

  .stat-label { color: #445566; }
  .stat-value { color: #00ff88; }

  .game-wrapper {
    position: relative;
    border: 2px solid #00ff8833;
    box-shadow: 0 0 30px #00ff8822, inset 0 0 30px #00000088;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    gap: 16px;
  }

  .overlay h2 {
    font-size: 14px;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    letter-spacing: 2px;
  }

  .overlay p {
    font-size: 8px;
    color: #556677;
    line-height: 2;
    text-align: center;
  }

  .btn {
    margin-top: 8px;
    padding: 12px 28px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: transparent;
    border: 2px solid #00ff88;
    color: #00ff88;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    text-shadow: 0 0 10px #00ff88;
    box-shadow: 0 0 15px #00ff8822;
  }

  .btn:hover {
    background: #00ff8822;
    box-shadow: 0 0 25px #00ff8844;
    transform: scale(1.05);
  }

  .controls-hint {
    margin-top: 12px;
    font-size: 7px;
    color: #334455;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="title">🐍 SNAKE</div>

<div class="stats">
  <div><span class="stat-label">SCORE </span><span class="stat-value" id="scoreDisplay">000</span></div>
  <div><span class="stat-label">BEST </span><span class="stat-value" id="bestDisplay">000</span></div>
  <div><span class="stat-label">LEVEL </span><span class="stat-value" id="levelDisplay">1</span></div>
</div>

<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <h2>SNAKE</h2>
    <p>方向键 / WASD 控制方向<br>吃到食物得分升级<br>撞墙或撞自己即失败</p>
    <button class="btn" id="startBtn">▶ 开始游戏</button>
  </div>
</div>

<div class="controls-hint">↑ ↓ ← → 或 W A S D</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const levelDisplay = document.getElementById('levelDisplay');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best, level, speed, gameLoop, running, particles;

function pad(n) { return String(n).padStart(3, '0'); }

function initGame() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  speed = 150;
  particles = [];
  spawnFood();
  updateUI();
}

function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateUI() {
  scoreDisplay.textContent = pad(score);
  bestDisplay.textContent = pad(best || 0);
  levelDisplay.textContent = level;
}

function spawnParticles(x, y) {
  const colors = ['#00ff88', '#00ccff', '#ffcc00', '#ff6644'];
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x * CELL + CELL / 2,
      y: y * CELL + CELL / 2,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 4 + 2
    });
  }
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    if (score > (best || 0)) best = score;
    spawnParticles(food.x, food.y);
    spawnFood();
    if (score % 50 === 0) {
      level = Math.min(10, level + 1);
      speed = Math.max(60, 150 - (level - 1) * 12);
      restartLoop();
    }
    updateUI();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#111118';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.06;
  });
  ctx.globalAlpha = 1;

  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const t = Date.now() / 400;
  const pulse = 1 + Math.sin(t) * 0.15;

  ctx.save();
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(fx, fy, (CELL / 2 - 3) * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff8888';
  ctx.beginPath();
  ctx.arc(fx - 2, fy - 2, 3 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const ratio = 1 - i / snake.length;
    const alpha = 0.4 + ratio * 0.6;

    ctx.save();
    ctx.shadowColor = `rgba(0,255,136,${alpha * 0.6})`;
    ctx.shadowBlur = isHead ? 20 : 8;

    if (isHead) {
      ctx.fillStyle = '#00ff88';
    } else {
      const g = Math.floor(100 + ratio * 155);
      ctx.fillStyle = `rgb(0,${g},${Math.floor(g * 0.6)})`;
    }

    const margin = isHead ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(
      seg.x * CELL + margin,
      seg.y * CELL + margin,
      CELL - margin * 2,
      CELL - margin * 2,
      isHead ? 4 : 3
    );
    ctx.fill();

    if (isHead) {
      ctx.fillStyle = '#001a0d';
      const ex = dir.x !== 0 ? (dir.x > 0 ? 12 : 6) : CELL / 2 - 3;
      const ey = dir.y !== 0 ? (dir.y > 0 ? 12 : 6) : CELL / 2 - 3;
      ctx.beginPath();
      ctx.arc(seg.x * CELL + ex, seg.y * CELL + ey, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(seg.x * CELL + ex + (dir.x === 0 ? 6 : 0), seg.y * CELL + ey + (dir.y === 0 ? 6 : 0), 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  });
}

function gameStep() {
  update();
  draw();
}

function restartLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(gameStep, speed);
}

function startGame() {
  overlay.style.display = 'none';
  initGame();
  running = true;
  restartLoop();
  requestAnimationFrame(animFrame);
}

function animFrame() {
  if (!running) return;
  draw();
  requestAnimationFrame(animFrame);
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  if (score > (best || 0)) best = score;
  updateUI();

  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h2 style="color:#ff4444;text-shadow:0 0 20px #ff4444;">GAME OVER</h2>
    <p style="color:#445566;">得分 <span style="color:#00ff88">${pad(score)}</span> &nbsp;|&nbsp; 最高 <span style="color:#ffcc00">${pad(best)}</span><br>等级 ${level}</p>
    <button class="btn" onclick="startGame()" style="margin-top:8px">▶ 再来一局</button>
  `;
}

document.addEventListener('keydown', e => {
  const keys = {
    ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
  };
  const newDir = keys[e.key];
  if (newDir) {
    e.preventDefault();
    if (newDir.x !== -dir.x || newDir.y !== -dir.y) {
      nextDir = newDir;
    }
  }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    const newDir = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
    if (newDir.x !== -dir.x) nextDir = newDir;
  } else {
    const newDir = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
    if (newDir.y !== -dir.y) nextDir = newDir;
  }
  touchStart = null;
  e.preventDefault();
}, { passive: false });

document.getElementById('startBtn').addEventListener('click', startGame);

best = 0;
bestDisplay.textContent = pad(0);

// Draw initial frame
initGame();
draw();
overlay.style.display = 'flex';
</script>
</body>
</html>
